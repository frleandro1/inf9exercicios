<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Perfil</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        div {
            background: white;
            width: 300px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; margin: 0 0 5px 0; }
        p { color: #666; margin: 5px 0; }
        .profissao { color: #0066cc; font-weight: bold; }
        button { background: #0066cc; color: white; border: none; padding: 10px 20px; margin: 10px 5px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0052a3; }
    </style>
</head>
<body>
    <div>
        <h1>Leandro Rodrigues</h1>
        <p class="profissao">Desenvolvedor Web</p>
        <p>Apaixonado por criar experiências incríveis!</p>
        <button>Contato</button>
        <button>Portfólio</button>
    </div>
</body>
</html>
